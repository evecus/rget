name: Build Musl Release on Tag

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            suffix: amd64-musl
            linker: x86_64-linux-musl-gcc
            apt_packages: musl-tools
          - target: aarch64-unknown-linux-musl
            suffix: arm64-musl
            linker: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.target }}
        override: true

    - name: Install cross-compilation tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ matrix.apt_packages }}

    - name: Configure Cargo Linker
      run: |
        mkdir -p .cargo
        cat > .cargo/config.toml << EOF
        [target.${{ matrix.target }}]
        linker = "${{ matrix.linker }}"
        EOF

    - name: Build Release
      uses: actions-rs/cargo@v1
      with:
        command: build
        args: --release --target ${{ matrix.target }}

    - name: Package Binary
      run: |
        cd target/${{ matrix.target }}/release
        tar czf ../../../rwgt-linux-${{ matrix.suffix }}.tar.gz rwgt
        cd ../../..

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: rwgt-linux-${{ matrix.suffix }}
        path: rwgt-linux-${{ matrix.suffix }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download AMD64 Artifact
        uses: actions/download-artifact@v3
        with:
          name: rwgt-linux-amd64-musl
          path: ./artifacts
      
      - name: Download ARM64 Artifact
        uses: actions/download-artifact@v3
        with:
          name: rwgt-linux-arm64-musl
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.1.0
          name: rget v0.1.0
          files: ./artifacts/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
