name: Build and Release on Tag

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: amd64
            need_cross_toolchain: false
          - target: aarch64-unknown-linux-gnu
            suffix: arm64
            need_cross_toolchain: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.target }}
        override: true

    - name: Install cross-compilation tools (ARM64)
      if: matrix.need_cross_toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Configure Cargo for ARM64
      if: matrix.need_cross_toolchain
      run: |
        mkdir -p .cargo
        cat > .cargo/config.toml << EOF
        [target.aarch64-unknown-linux-gnu]
        linker = "aarch64-linux-gnu-gcc"
        EOF

    - name: Build Release
      uses: actions-rs/cargo@v1
      with:
        command: build
        args: --release --target ${{ matrix.target }}

    - name: Package Binary
      run: |
        cd target/${{ matrix.target }}/release
        tar czf ../../../rwgt-linux-${{ matrix.suffix }}.tar.gz rwgt
        cd ../../..

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: rwgt-linux-${{ matrix.suffix }}
        path: rwgt-linux-${{ matrix.suffix }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download AMD64 Artifact
        uses: actions/download-artifact@v3
        with:
          name: rwgt-linux-amd64
          path: ./artifacts
      
      - name: Download ARM64 Artifact
        uses: actions/download-artifact@v3
        with:
          name: rwgt-linux-arm64
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
